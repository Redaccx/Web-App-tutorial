<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Site Temporarily Down</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        direction: ltr;
    }

    .container {
        background: white;
        padding: 50px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        max-width: 400px;
    }

    h1 {
        font-size: 28px;
        color: #e74c3c;
        margin-bottom: 20px;
    }

    p {
        color: #555;
        font-size: 16px;
        margin-bottom: 30px;
    }

    .btn {
        text-decoration: none;
        padding: 12px 25px;
        background: #3498db;
        color: white;
        border-radius: 8px;
        transition: 0.3s;
        display: inline-block;
    }

    .btn:hover {
        background: #2980b9;
    }

    .icon {
        font-size: 50px;
        color: #e74c3c;
        margin-bottom: 15px;
    }
</style>
</head>
<body>
    <div class="container">
        <div class="icon">⚠️</div>
        <h1>Site Temporarily Down</h1>
        <p>We are currently performing maintenance. Please try again later.</p>
        <a href="/" class="btn">Return to Homepage</a>
    </div>
</body>
</html>
